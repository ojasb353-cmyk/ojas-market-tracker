<!DOCTYPE html>
<html>
<head>
    <title>Ojas's Personal Market Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="60">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
        }
        header {
            background: linear-gradient(90deg,#0f2027,#203a43,#2c5364);
            padding: 20px;
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .clock {
            text-align: center;
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
            gap: 15px;
            padding: 20px;
        }
        .card {
            background: #1e293b;
            padding: 18px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            transition: 0.3s;
        }
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(59,130,246,0.6);
        }
        .price {
            font-size: 22px;
            font-weight: bold;
        }
        .currency {
            font-size: 12px;
            color: #ccc;
        }
        .positive { color: #22c55e; }
        .negative { color: #ef4444; }
    </style>
</head>
<body>

<header>
    Ojas's Personal Market Tracker
</header>

<div class="clock">
    Live Market Bulletin | {{ time }}
</div>

<div class="container">
    {% for key, value in data.items() %}
    <div class="card">
        <h3>{{ key }}</h3>
        <div class="price">
            ₹ {{ value.price }} 
            <span class="currency">({{ value.currency }})</span>
        </div>
        <div class="{% if value.change > 0 %}positive{% else %}negative{% endif %}">
            {{ value.change }} %
        </div>
        <div>{{ value.sentiment }}</div>
    </div>
    {% endfor %}
</div>

</body>
</html>
