<!DOCTYPE html>
<html>
<head>
    <title>Ojas Global Macro Dashboard</title>
    <meta http-equiv="refresh" content="60">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        h1 {
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        .risk {
            text-align: center;
            font-size: 20px;
            margin-bottom: 10px;
        }

        .time {
            text-align: center;
            font-size: 14px;
            opacity: 0.7;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            padding: 30px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .price {
            font-size: 22px;
            margin: 10px 0;
        }

        .positive { color: #00ff9c; }
        .negative { color: #ff4d4d; }

    </style>
</head>
<body>

<h1>Ojas Global Macro Dashboard</h1>
<div class="risk">{{ risk }}</div>
<div class="time">Live Market Bulletin | {{ time }}</div>

<div class="grid">
    {% for name, item in data.items() %}
    <div class="card">
        <h3>{{ name }}</h3>
        <div class="price">{{ item.price }}</div>

        {% if item.change > 0 %}
            <div class="positive">{{ item.change }} %</div>
        {% else %}
            <div class="negative">{{ item.change }} %</div>
        {% endif %}

        <div>{{ item.sentiment }}</div>
    </div>
    {% endfor %}
</div>

</body>
</html>
