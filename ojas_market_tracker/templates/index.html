<!DOCTYPE html>
<html>
<head>
<title>OJAS RAW MACRO TERMINAL</title>
<meta http-equiv="refresh" content="120">
<style>
body { background:#060c14; color:#e6edf3; font-family:Arial; padding:25px; }
h1 { text-align:center; letter-spacing:2px; }
.banner { background:#102231; padding:12px; margin:20px 0; border-left:4px solid #00c8ff; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:18px; }
.card { background:#0e1721; padding:18px; border-radius:8px; border:1px solid #1f2a36; }
.green{color:#00e676;} .red{color:#ff5252;}
.small{font-size:12px;color:#9aa4af;}
</style>
</head>
<body>

<h1>OJAS RAW MACRO TERMINAL</h1>
<div style="text-align:center;font-size:12px;">Live | {{ time }}</div>

<div class="banner">
AI Regime: <strong>{{ regime }}</strong>
</div>

<div class="grid">

{% for name, asset in assets.items() %}
<div class="card">

<div class="small">{{ name }}</div>

<div style="font-size:22px;margin-top:6px;">
{{ asset.price }}
</div>

<div class="{{ 'green' if asset.change > 0 else 'red' }}">
{{ '▲' if asset.change > 0 else '▼' }} {{ asset.change }}%
</div>

</div>
{% endfor %}

</div>

<br>
<div class="card">
Fed Funds: {{ fed }}% | RBI Repo: {{ rbi }}%
</div>

</body>
</html>
