<!DOCTYPE html>
<html>
<head>
    <title>Ojas Market Dashboard</title>
    <meta http-equiv="refresh" content="60">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f2027;
            color: white;
        }
        h1 {
            text-align: center;
            padding: 20px;
        }
        .time {
            text-align: center;
            opacity: 0.6;
            margin-bottom: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .card {
            background: #1c2b36;
            padding: 20px;
            border-radius: 10px;
        }
        .positive { color: #00ff99; }
        .negative { color: #ff4d4d; }
    </style>
</head>
<body>

<h1>Ojas Market Dashboard</h1>
<div class="time">Live | {{ time }}</div>

<div class="grid">
    {% for name, item in data.items() %}
    <div class="card">
        <h3>{{ name }}</h3>
        <div>{{ item.price }}</div>

        {% if item.change > 0 %}
            <div class="positive">{{ item.change }}%</div>
        {% else %}
            <div class="negative">{{ item.change }}%</div>
        {% endif %}

        <div>{{ item.sentiment }}</div>
    </div>
    {% endfor %}
</div>

</body>
</html>
